name: HerbalAI Deploy

# Single deploy pipeline, run after a successful CI run on main (or manually).
# Job order is guaranteed: `build` pushes the :sha image + Trivy-scans it,
# then `deploy` (needs build) syncs the frontend and rolls ECS onto :sha.
# This avoids the race where a separate ECR push could finish AFTER the
# ECS task-def register step.

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["HerbalAI CI"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write   # OIDC role assumption
  contents: read

env:
  REGION: us-east-1
  ECR_REPO: ${{ vars.ECR_REPO }}   # e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/herbalai-prod-backend

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.REGION }}
          role-session-name: ecr-push

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REPO }}:${{ github.sha }}
            ${{ env.ECR_REPO }}:latest

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPO }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: "HIGH,CRITICAL"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.REGION }}
          role-session-name: deploy

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Deploy frontend (S3 + CloudFront)
        run: |
          aws s3 sync frontend/dist/ s3://${{ vars.S3_BUCKET }} --delete
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CF_DIST_ID }} --paths "/*"

      - name: Deploy backend (ECS rolling, zero-downtime)
        env:
          FAMILY: herbalai-prod-backend
          CLUSTER: herbalai-prod-cluster
          SERVICE: herbalai-prod-backend
          IMAGE_TAG: ${{ github.sha }}
          ECR_REPO: ${{ vars.ECR_REPO }}
        run: |
          set -euo pipefail
          # Register a new task-def revision pinned to the :sha image, then
          # roll the service onto it. ALB health checks gate traffic.
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query 'taskDefinition' --output json)
          NEW_DEF=$(echo "$TASK_DEF" | jq --arg img "$ECR_REPO:$IMAGE_TAG" \
            '.containerDefinitions[0].image=$img
             | {family: .family,
                containerDefinitions: .containerDefinitions,
                cpu: .cpu, memory: .memory,
                networkMode: .networkMode,
                requiresCompatibilities: .requiresCompatibilities,
                executionRoleArn: .executionRoleArn,
                taskRoleArn: .taskRoleArn}')
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service \
            --cluster "$CLUSTER" --service "$SERVICE" \
            --task-definition "$NEW_ARN" --force-new-deployment
          aws ecs wait services-stable \
            --cluster "$CLUSTER" --services "$SERVICE"

      - name: Post-deploy health check
        run: |
          curl -fsS "${{ vars.API_HEALTH_URL }}" || true
