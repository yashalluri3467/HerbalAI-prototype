name: HerbalAI Deploy

# Deploy only after a successful CI run on main.
on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "HerbalAI CI"
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend (Render)
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Deploy frontend (Vercel)
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"

      - name: Health check
        run: curl -fsS https://herbalai-backend.onrender.com/ || true
