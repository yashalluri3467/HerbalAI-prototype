apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # Local image built earlier; Docker Desktop K8s shares the Docker image cache.
          image: herbalai-prototype-backend:latest
          # IfNotPresent lets Docker Desktop's K8s resolve the locally-built image
          # from the Docker daemon's store. (Never would fail with ErrImageNeverPull
          # because the K8s node runs its own containerd.)
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: OPENROUTER_MODEL
              value: "openrouter/auto"
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: herbalai-secrets
                  key: openrouter-api-key
                  optional: true
          # Session-history DB. Activates only when the secret key is populated.
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: herbalai-secrets
                key: database-url
                optional: true
          # Probe the root health endpoint, which always returns 200 and does
          # NOT depend on the knowledge-base toggle. (The /api/herbs endpoint
          # returns 503 when the knowledge base is disabled in settings, which
          # would otherwise make K8s restart the pod and reset in-memory settings.)
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
