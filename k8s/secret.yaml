apiVersion: v1
kind: Secret
metadata:
  name: herbalai-secrets
type: Opaque
stringData:
  # Leave empty if you don't use the LLM clinical summary feature.
  # To set a real key: kubectl create secret generic herbalai-secrets \
  #   --from-literal=openrouter-api-key=YOUR_KEY --dry-run=client -o yaml | kubectl apply -f -
  openrouter-api-key: ""
  # Leave empty to run without session-history persistence (safe standby).
  # Format: postgresql+asyncpg://USER:PASS@HOST/DB?ssl=require
  database-url: ""
